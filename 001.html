<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <title>Rekap Risiko</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    :root{
      --primary:#007bff;
      --grey:#f5f5f5;
      --text:#222;
      --border:#ddd;
      font-family:Arial,Helvetica,sans-serif;
      font-size:12px;
    }
    
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
    }
    
    body {
      color: var(--text);
      background: #fff;
      padding: 0 8px 40px;
    }
    
    header {
      padding: 12px 0;
      border-bottom: 2px solid var(--primary);
    }
    
    header h1 {
      margin: 0;
      font-size: 14px;
    }
    
    header p {
      margin: 2px 0;
      font-size: 11px;
      color: #555;
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      padding: 6px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    
    #toolbar input {
      flex: 1 1 200px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 12px;
    }
    
    button {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--grey);
      cursor: pointer;
      font-size: 12px;
    }
    
    button:hover {
      background: #e4e4e4;
    }

    .table-wrapper {
      overflow: auto;
      max-height: 75vh;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-top: 6px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    
    th, td {
      padding: 4px 6px;
      border: 1px solid var(--border);
      font-size: 12px;
      vertical-align: top;
      white-space: normal;
      word-break: break-word;
      line-height: 1.3;
    }
    
    th {
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    
    td.sticky-col, th.sticky-col {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #f0f0f0;
    }
    
    tr:nth-child(even) td {
      background: var(--grey);
    }

    col.col1 { width: 5ch; }
    col.col2 { width: 15ch; }
    col.col5 { width: 15ch; }
    col.col6 { width: 15ch; }

    .skeleton {
      height: 14px;
      background: linear-gradient(90deg, #eee 40%, #ddd 50%, #eee 60%);
      background-size: 200% 100%;
      animation: shimmer 1s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    #backBtn {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--grey);
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
    }
    
    #backBtn:hover {
      background: #e4e4e4;
    }

    /* ========== TRUE FULLSCREEN STYLES ========== */
    :fullscreen {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }
    
    :-webkit-full-screen {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }
    
    :-moz-full-screen {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }
    
    :-ms-fullscreen {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }

    /* Saat fullscreen aktif, pastikan semua elemen mengisi layar */
    :fullscreen body,
    :-webkit-full-screen body,
    :-moz-full-screen body,
    :-ms-fullscreen body {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      padding: 10px;
      overflow: auto;
    }

    :fullscreen .table-wrapper,
    :-webkit-full-screen .table-wrapper,
    :-moz-full-screen .table-wrapper,
    :-ms-fullscreen .table-wrapper {
      max-height: calc(100vh - 150px) !important;
      height: calc(100vh - 150px) !important;
    }

    /* Tombol exit di pojok kanan atas saat fullscreen */
    #exitFullscreenBtn {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2147483647;
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    #exitFullscreenBtn:hover {
      background: #c82333;
    }
    
    :fullscreen #exitFullscreenBtn,
    :-webkit-full-screen #exitFullscreenBtn,
    :-moz-full-screen #exitFullscreenBtn,
    :-ms-fullscreen #exitFullscreenBtn {
      display: block;
    }

    /* Overlay untuk memastikan fullscreen benar-benar penuh */
    #fullscreenOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #fff;
      z-index: 999999;
      overflow: auto;
      padding: 10px;
    }
    
    #fullscreenOverlay.active {
      display: block;
    }
    
    #fullscreenOverlay header,
    #fullscreenOverlay #toolbar {
      position: relative;
    }
    
    #fullscreenOverlay .table-wrapper {
      max-height: calc(100vh - 120px);
      height: calc(100vh - 120px);
    }
  </style>
</head>
<body>
  <!-- Tombol exit fullscreen -->
  <button id="exitFullscreenBtn" onclick="exitFullscreen()">✕ Exit Fullscreen</button>

  <header>
    <h1 id="docTitle">01 Katalog Risiko Front Liner</h1>
    <p>German Sparkassenstiftung - Perbarindo DPD Jateng</p>
  </header>

  <div id="toolbar">
    <span id="rowCount">memuat…</span>
    <input id="searchInput" type="text" placeholder="Cari data…"/>
    <button id="fullscreenBtn">⛶ Fullscreen</button>
    <button id="pdfBtn">📄 PDF</button>
    <button id="toTop">⬆️</button>
    <button id="toBottom">⬇️</button>
    <a id="backBtn" href="https://www.perbarindodpdjateng.or.id/kr" target="_blank" title="Kembali ke Menu">← Menu</a>
  </div>

  <div class="table-wrapper">
    <table id="dataTable">
      <colgroup>
        <col class="col1">
        <col class="col2">
        <col>
        <col>
        <col class="col5">
        <col class="col6">
        <col>
      </colgroup>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"><tr><td colspan="7" class="skeleton"></td></tr></tbody>
    </table>
  </div>

  <!-- Overlay untuk fullscreen mode -->
  <div id="fullscreenOverlay">
    <button id="exitFullscreenBtnOverlay" onclick="exitFullscreen()" style="position:fixed;top:10px;right:10px;z-index:2147483647;background:#dc3545;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;">✕ Exit Fullscreen</button>
    <div id="fullscreenContent"></div>
  </div>

  <script>
    /* ========== CONFIG ========== */
    const sheetUrl = 'https://script.google.com/macros/s/AKfycbxE4c9umA07jbX9dOg97AW6KWU2KN084-3QH4crhS0AgF7KVsSTvwrEtFI3pYCDub9Y/exec';
    let originalData=[], filteredData=[];

    const COL_CH = [5, 15, 20, 20, 20, 20, 0];
    const PX_PER_CH = 8;
    const PX_TO_MM = 0.2645;
    const A4L_MM = 297;
    const MARGIN = 6;

    function ch2mm(ch) { return ch * PX_PER_CH * PX_TO_MM; }

    function buildColWidth(headerRow) {
      const dynamicCount = headerRow.length - COL_CH.length;
      const dynamicWidth = (A4L_MM - 2*MARGIN - COL_CH.reduce((a,b)=>a+b,0)*PX_PER_CH*PX_TO_MM) / Math.max(1,dynamicCount);
      return headerRow.map((_,i)=>{
        const ch = COL_CH[i] || 0;
        return ch ? ch2mm(ch) : dynamicWidth;
      });
    }

    const $=id=>document.getElementById(id);

    function sanitize(arr){
      return arr.map(r=>
        r.map(c=>
          String(c??'')
            .replace(/^[\s\uFEFF\xA0\-\•●■▪▫–—]+/g,'')
            .replace(/\r/g,' ')
            .replace(/\n+/g,' ')
            .replace(/\s{2,}/g,' ')
            .trim()
        )
      ).filter(r=>r.length);
    }

    async function fetchData(){
      try{
        const res = await fetch(sheetUrl, {cache:'no-store'});
        const d   = await res.json();
        originalData = sanitize(d||[]);
        filteredData = [...originalData];
        render();
      }catch(e){
        console.error(e);
        $('rowCount').textContent='gagal memuat';
      }
    }

    function render(){
      const headerRow = originalData[0] || [];
      $('rowCount').textContent=`Jml Data : ${originalData.length-1}`;
      $('tableHead').innerHTML='<tr>'+
        headerRow.map((h,i)=>`<th class="${i===0?'sticky-col':''}">${h}</th>`).join('')+
      '</tr>';

      $('tableBody').innerHTML=filteredData.slice(1).map(r=>
        '<tr>'+r.map((c,i)=>{
          const pad='                                                     ';
          const txt=String(c??'')+pad;
          return`<td class="${i===0?'sticky-col':''}">${txt}</td>`;
        }).join('')+'</tr>'
      ).join('');
    }

    $('searchInput').addEventListener('input',e=>{
      const k=e.target.value.toLowerCase();
      filteredData=originalData.filter(r=>r.some(c=>String(c??'').toLowerCase().includes(k)));
      render();
    });

    /* ========== FULLSCREEN FUNCTION ========== */
    let isFullscreen = false;

    function supportsNativeFullscreen() {
      const doc = document;
      return !!(doc.fullscreenEnabled || doc.webkitFullscreenEnabled || 
                doc.mozFullScreenEnabled || doc.msFullscreenEnabled);
    }

    function enterNativeFullscreen() {
      const elem = document.documentElement;
      
      // Coba berbagai metode fullscreen
      const methods = [
        'requestFullscreen',
        'webkitRequestFullscreen',
        'mozRequestFullScreen',
        'msRequestFullscreen'
      ];
      
      for (let method of methods) {
        if (elem[method]) {
          elem[method]();
          return true;
        }
      }
      return false;
    }

    function exitNativeFullscreen() {
      const doc = document;
      const methods = [
        'exitFullscreen',
        'webkitExitFullscreen',
        'mozCancelFullScreen',
        'msExitFullscreen'
      ];
      
      for (let method of methods) {
        if (doc[method]) {
          doc[method]();
          return;
        }
      }
    }

    function enterOverlayFullscreen() {
      // Metode alternatif: clone semua konten ke overlay
      const overlay = $('fullscreenOverlay');
      const content = $('fullscreenContent');
      
      // Clone konten utama
      content.innerHTML = '';
      content.appendChild(document.querySelector('header').cloneNode(true));
      content.appendChild($('toolbar').cloneNode(true));
      
      const tableWrapper = document.querySelector('.table-wrapper').cloneNode(true);
      tableWrapper.style.maxHeight = 'calc(100vh - 120px)';
      tableWrapper.style.height = 'calc(100vh - 120px)';
      content.appendChild(tableWrapper);
      
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      isFullscreen = true;
      updateFullscreenButton();
    }

    function exitOverlayFullscreen() {
      const overlay = $('fullscreenOverlay');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      isFullscreen = false;
      updateFullscreenButton();
    }

    function updateFullscreenButton() {
      const btn = $('fullscreenBtn');
      if (isFullscreen) {
        btn.innerHTML = '⛶ Exit Fullscreen';
      } else {
        btn.innerHTML = '⛶ Fullscreen';
      }
    }

    function toggleFullscreen() {
      if (isFullscreen) {
        exitFullscreen();
      } else {
        // Coba native fullscreen dulu
        if (supportsNativeFullscreen()) {
          try {
            const success = enterNativeFullscreen();
            if (success) {
              isFullscreen = true;
              updateFullscreenButton();
              return;
            }
          } catch (e) {
            console.log('Native fullscreen failed:', e);
          }
        }
        
        // Fallback ke overlay fullscreen
        enterOverlayFullscreen();
      }
    }

    function exitFullscreen() {
      // Cek apakah sedang dalam native fullscreen
      const doc = document;
      if (doc.fullscreenElement || doc.webkitFullscreenElement || 
          doc.mozFullScreenElement || doc.msFullscreenElement) {
        exitNativeFullscreen();
      }
      
      // Selalu coba exit overlay juga
      exitOverlayFullscreen();
      
      isFullscreen = false;
      updateFullscreenButton();
    }

    // Event listener untuk tombol fullscreen
    $('fullscreenBtn').addEventListener('click', toggleFullscreen);

    // Deteksi perubahan native fullscreen
    function handleFullscreenChange() {
      const doc = document;
      const isNativeFullscreen = !!(doc.fullscreenElement || doc.webkitFullscreenElement || 
                                    doc.mozFullScreenElement || doc.msFullscreenElement);
      
      if (!isNativeFullscreen && isFullscreen) {
        // User keluar dari fullscreen (misalnya tekan ESC)
        isFullscreen = false;
        updateFullscreenButton();
        exitOverlayFullscreen();
      } else if (isNativeFullscreen && !isFullscreen) {
        isFullscreen = true;
        updateFullscreenButton();
      }
    }

    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);

    // Escape key untuk exit fullscreen
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isFullscreen) {
        exitFullscreen();
      }
    });

    // Double click pada header untuk toggle fullscreen
    document.querySelector('header').addEventListener('dblclick', toggleFullscreen);

    async function downloadPDF(){
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
      const title = $('docTitle').textContent.trim();
      const fileName = `${title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.pdf`;

      const headerRow = originalData[0] || [];
      const colWidth  = buildColWidth(headerRow);
      const margin    = 6;
      const footerY   = 201;
      const rowHeight = 6;

      const writeHeader = (yPos) => {
        headerRow.forEach((h,i)=>{
          const x = margin + colWidth.slice(0,i).reduce((a,b)=>a+b,0);
          doc.rect(x, yPos, colWidth[i], rowHeight);
          doc.text(h, x+1, yPos+4.5);
        });
      };

      doc.setFontSize(14);
      doc.text(title, margin, 12);
      doc.setFontSize(10);
      let y = 18;
      writeHeader(y);
      y += rowHeight;

      filteredData.slice(1).forEach(r=>{
        let maxLines = 1;
        r.forEach((c,i)=>{
          const lines = doc.splitTextToSize(String(c??''), colWidth[i]-1);
          maxLines = Math.max(maxLines, lines.length);
        });
        const rowH = Math.max(20, maxLines*6.2+1);

        if(y + rowH > footerY - 8){
          doc.setFontSize(9);
          doc.text('German Sparkassenstiftung - Perbarindo DPD Jateng | Website Design & Development by Heru PheWhe',
                   297/2, footerY, {align:'center'});
          doc.addPage();
          y = 12;
          writeHeader(y);
          y += rowHeight;
        }

        r.forEach((c,i)=>{
          const x = margin + colWidth.slice(0,i).reduce((a,b)=>a+b,0);
          const lines = doc.splitTextToSize(String(c??''), colWidth[i]-1);
          doc.rect(x, y, colWidth[i], rowH);
          doc.text(lines, x+1, y+3.5);
        });
        y += rowH;
      });

      doc.setFontSize(9);
      doc.text('German Sparkassenstiftung - Perbarindo DPD Jateng | Website Design & Development by Heru PheWhe',
               297/2, footerY, {align:'center'});
      doc.save(fileName);
    }

    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload=()=>$('pdfBtn').addEventListener('click',downloadPDF);
    document.head.appendChild(script);

    $('toTop').onclick   =()=> document.querySelector('.table-wrapper').scrollTop = 0;
    $('toBottom').onclick=()=>{
      const wrap=document.querySelector('.table-wrapper');
      wrap.scrollTop=wrap.scrollHeight;
    };

    fetchData();
    setInterval(fetchData,15000);
  </script>
</body>
</html>
